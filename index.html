<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deep in Shadows</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        
        <canvas id="gameCanvas"></canvas>
         
        <div id="startScreen">
            <div id="title">
                <h1>REBEL SHADOWS</h1>
            </div>

            <div id="wizardSelector" style="margin-bottom: 20px;">
                <input type="number" id="wizardIdInput" placeholder="Enter Wizard ID" 
                       style="padding: 10px; border-radius: 5px; border: none; width: 150px;">
            </div>
            
            <button id="startButton">START GAME</button>
        </div>

        <div id="characterSetup" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; display: flex; flex-direction: column; align-items: center; font-family: 'Courier New', monospace; overflow-y: auto; padding: 10px; box-sizing: border-box;">
    
    <h1 id="wizardDisplayName" style="margin: 10px 0; color: #a382ff; text-shadow: 1px 1px #000; font-size: 1.5em; text-align: center;">WIZARD #?</h1>
    
    <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; max-width: 500px;">
        
        <div style="display: flex; flex-direction: row; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border: 1px dashed #444; width: 100%; box-sizing: border-box; align-items: center;">
            <img id="setupWizImage" src="" style="width: 100px; height: 100px; image-rendering: pixelated; border: 2px solid #573191;">
            
            <div id="traitsDisplay" style="flex: 1; font-size: 0.75em; line-height: 1.2;">
                <h3 style="color: #573191; border-bottom: 1px solid #573191; margin: 0 0 5px 0; font-size: 1em;">TRAITS</h3>
                <p style="margin: 2px 0;"><strong>H:</strong> <span id="trait-head">-</span></p>
                <p style="margin: 2px 0;"><strong>B:</strong> <span id="trait-body">-</span></p>
                <p style="margin: 2px 0;"><strong>P:</strong> <span id="trait-prop">-</span></p>
                <p style="margin: 2px 0;"><strong>F:</strong> <span id="trait-familiar">-</span></p>
            </div>
        </div>
        
        <div id="statsContainer" style="background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #573191; border-radius: 10px; width: 100%; box-sizing: border-box;">
            <p style="font-size: 1em; margin-bottom: 10px; color: #ffd700; text-align: center;">Essences: <span id="availableEssence">10</span></p>
            
            <table style="border-collapse: collapse; width: 100%; font-size: 0.85em;">
                <thead>
                    <tr style="border-bottom: 1px solid #573191; color: #a382ff;">
                        <th style="text-align: left; padding: 5px;">STAT</th>
                        <th style="text-align: center; padding: 5px;">BASE</th>
                        <th style="text-align: center; padding: 5px;">AFFINITY</th>
                    </tr>
                </thead>
                <tbody id="statsBody">
                    </tbody>
            </table>
            
            <button id="confirmStats" style="margin-top: 20px; width: 100%; padding: 12px; cursor: pointer; background: #573191; color: white; border: none; font-weight: bold; font-family: inherit; border-radius: 5px;">START ADVENTURE</button>
        </div>

    </div>
</div>
        
        <div id="powerUpScreen" style="display: none;">
            <h1>LEVEL UP!</h1>
            <p>Points available: <span id="skill-points">1</span></p>
            
            <div class="skill-tree-container">
                <div class="skill-path" data-path="offense">
                    <h3>OFFENSE</h3>
                    <button class="skill-node locked" data-level="1">Offense I</button>
                    <button class="skill-node locked" data-level="2">Offense II</button>
                    <button class="skill-node locked" data-level="3">Offense III</button>
                    <button class="skill-node locked" data-level="4">Offense IV</button>
                    <button class="skill-node locked" data-level="5">ULTIMATE ATK</button>
                </div>

                <div class="skill-path" data-path="defense">
                    <h3>DEFENSE</h3>
                    <button class="skill-node locked" data-level="1">Defense I</button>
                    <button class="skill-node locked" data-level="2">Defense II</button>
                    <button class="skill-node locked" data-level="3">Defense III</button>
                    <button class="skill-node locked" data-level="4">Defense IV</button>
                    <button class="skill-node locked" data-level="5">IMMORTAL</button>
                </div>

                <div class="skill-path" data-path="speed">
                    <h3>SPEED</h3>
                    <button class="skill-node locked" data-level="1">Speed I</button>
                    <button class="skill-node locked" data-level="2">Speed II</button>
                    <button class="skill-node locked" data-level="3">Speed III</button>
                    <button class="skill-node locked" data-level="4">Speed IV</button>
                    <button class="skill-node locked" data-level="5">TELEPORT</button>
                </div>

                <div class="skill-path" data-path="magic">
                    <h3>MAGIC</h3>
                    <button class="skill-node locked" data-level="1">Magic I</button>
                    <button class="skill-node locked" data-level="2">Magic II</button>
                    <button class="skill-node locked" data-level="3">Magic III</button>
                    <button class="skill-node locked" data-level="4">Magic IV</button>
                    <button class="skill-node locked" data-level="5">ARCHMAGE</button>
                </div>
            </div>
            
            <button id="closeSkills" style="margin-top: 20px;">BACK TO GAME</button>
        </div>
        
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
