<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep in Shadows</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        
        <canvas id="gameCanvas" width="393" height="852"></canvas>
        
        <div id="startScreen">
    <div id="title">
        <h1>REBEL SHADOWS</h1>
        <h4>After the summoning ritual, several Rebel Shadows slipped through the cracks of reality...</h4> 
        <h4>Only the Book of Shadows can track them down...</h4>
    </div>

    <div id="wizardSelector" style="margin-bottom: 20px;">
        <input type="number" id="wizardIdInput" placeholder="Enter Wizard ID (e.g. 557)" 
               style="padding: 10px; border-radius: 5px; border: none; width: 150px;">
        <button id="loadWizardButton" style="padding: 10px; cursor: pointer;">LOAD WIZARD</button>
    </div>
    
    <button id="startButton">START GAME</button>
</div>

        <div id="powerUpScreen" style="display: none;">
            <h1>BOSS DEFEATED!</h1>
            <h2>CHOOSE POWER-UP</h2>
            <div class="power-up-options">
                <button id="pu-fireRate" class="power-up-btn">IMPROVE FIRE RATE</button>
                <button id="pu-special" class="power-up-btn">IMPROVE SPECIAL ATTACK</button>
            </div>
        </div>
        
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
