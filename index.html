<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deep in Shadows</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        
        <canvas id="gameCanvas"></canvas>
         
        <div id="startScreen">
            <div id="title">
                <h1>REBEL SHADOWS</h1>
            </div>

            <div id="wizardSelector" style="margin-bottom: 20px;">
                <input type="number" id="wizardIdInput" placeholder="Enter Wizard ID" 
                       style="padding: 10px; border-radius: 5px; border: none; width: 150px;">
            </div>
            
            <button id="startButton">START GAME</button>
        </div>

        <div id="characterSetup" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; flex-direction: column; align-items: center; justify-content: center; font-family: 'Courier New', monospace; overflow-y: auto; padding: 20px;">
            
            <h1 id="wizardDisplayName" style="margin-bottom: 10px; color: #a382ff; text-shadow: 2px 2px #000;">WIZARD #?</h1>
            
            <div style="display: flex; gap: 40px; align-items: flex-start; justify-content: center; flex-wrap: wrap; max-width: 1000px;">
                
                <div style="display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px dashed #444;">
                    <img id="setupWizImage" src="" style="width: 256px; height: 256px; image-rendering: pixelated; border: 4px solid #573191; margin-bottom: 15px;">
                    
                    <div id="traitsDisplay" style="width: 100%; font-size: 0.9em; line-height: 1.4;">
                        <h3 style="color: #573191; border-bottom: 1px solid #573191; margin-bottom: 10px;">TRAITS</h3>
                        <p><strong>Head:</strong> <span id="trait-head">-</span></p>
                        <p><strong>Body:</strong> <span id="trait-body">-</span></p>
                        <p><strong>Prop:</strong> <span id="trait-prop">-</span></p>
                        <p><strong>Familiar:</strong> <span id="trait-familiar">-</span></p>
                        <p><strong>Background:</strong> <span id="trait-bg">-</span></p>
                    </div>
                </div>
                
                <div id="statsContainer" style="background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #573191; border-radius: 10px;">
                    <p style="font-size: 1.2em; margin-bottom: 15px; color: #ffd700;">Essences available: <span id="availableEssence">10</span></p>
                    
                    <table style="border-collapse: collapse; width: 100%;">
                        <thead>
                            <tr style="border-bottom: 2px solid #573191;">
                                <th style="text-align: left; padding: 10px;">Stat</th>
                                <th style="padding: 10px;">Base</th>
                                <th style="padding: 10px;">Affinity</th>
                                <th style="padding: 10px;">Add</th>
                            </tr>
                        </thead>
                        <tbody id="statsBody">
                            </tbody>
                    </table>
                    
                    <div style="display: flex; justify-content: center; width: 100%;">
                        <button id="confirmStats" style="margin-top: 25px; padding: 15px 30px; cursor: pointer; background: #573191; color: white; border: none; font-weight: bold; font-family: inherit;" disabled>START ADVENTURE</button>
                    </div>
                </div>

            </div>
        </div>
        
        <div id="powerUpScreen" style="display: none;">
            <h1>LEVEL UP!</h1>
            <p>Points available: <span id="skill-points">1</span></p>
            
            <div class="skill-tree-container">
                <div class="skill-path" data-path="offense">
                    <h3>OFFENSE</h3>
                    <button class="skill-node locked" data-level="1">Offense I</button>
                    <button class="skill-node locked" data-level="2">Offense II</button>
                    <button class="skill-node locked" data-level="3">Offense III</button>
                    <button class="skill-node locked" data-level="4">Offense IV</button>
                    <button class="skill-node locked" data-level="5">ULTIMATE ATK</button>
                </div>

                <div class="skill-path" data-path="defense">
                    <h3>DEFENSE</h3>
                    <button class="skill-node locked" data-level="1">Defense I</button>
                    <button class="skill-node locked" data-level="2">Defense II</button>
                    <button class="skill-node locked" data-level="3">Defense III</button>
                    <button class="skill-node locked" data-level="4">Defense IV</button>
                    <button class="skill-node locked" data-level="5">IMMORTAL</button>
                </div>

                <div class="skill-path" data-path="speed">
                    <h3>SPEED</h3>
                    <button class="skill-node locked" data-level="1">Speed I</button>
                    <button class="skill-node locked" data-level="2">Speed II</button>
                    <button class="skill-node locked" data-level="3">Speed III</button>
                    <button class="skill-node locked" data-level="4">Speed IV</button>
                    <button class="skill-node locked" data-level="5">TELEPORT</button>
                </div>

                <div class="skill-path" data-path="magic">
                    <h3>MAGIC</h3>
                    <button class="skill-node locked" data-level="1">Magic I</button>
                    <button class="skill-node locked" data-level="2">Magic II</button>
                    <button class="skill-node locked" data-level="3">Magic III</button>
                    <button class="skill-node locked" data-level="4">Magic IV</button>
                    <button class="skill-node locked" data-level="5">ARCHMAGE</button>
                </div>
            </div>
            
            <button id="closeSkills" style="margin-top: 20px;">BACK TO GAME</button>
        </div>
        
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
