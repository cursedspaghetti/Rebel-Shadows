<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rebel Shadows</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="393" height="852"></canvas>
        
        <div id="startScreen">
            <h1>REBEL SHADOWS</h1>
            <div>
                <p>The ritual fractured.</p>
                <p>Few Shadows fled into the minds of the living.</p>
                <p>Only the Book of Shadows remains to bind them.</p>
            </div>
            <button id="startButton" style="margin-top: 30px;">START</button>
        </div>

        <div id="powerUpScreen">
            <h2>Choose power-ups:</h2>
            <div class="power-up-options">
                <button id="pu-fireRate">+ fire rate</button>
                <button id="pu-bullets">+ bullets</button>
                <button id="pu-speed">+ speed</button>
                <button id="pu-void-beam">void beam</button>
                <button id="pu-glacial-void">glacial void</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
