<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deep in Shadows</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        
        <canvas id="gameCanvas"></canvas>
         
        <div id="startScreen">
            <div id="title">
                <h1>REBEL SHADOWS</h1>
            </div>

            <div id="wizardSelector" style="margin-bottom: 20px;">
                <input type="number" id="wizardIdInput" placeholder="Enter Wizard ID" 
                       style="padding: 10px; border-radius: 5px; border: none; width: 150px;">
            </div>
            
            <button id="startButton">START GAME</button>
        </div>

<div id="characterSetup" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; color: white; flex-direction: column; align-items: center; font-family: 'Courier New', monospace; overflow-y: auto; padding: 15px; box-sizing: border-box; z-index: 100;">
    
    <h1 id="wizardDisplayName" style="margin: 10px 0; color: #a382ff; text-shadow: 2px 2px #000; font-size: 1.4em; text-align: center;">WIZARD #?</h1>
    
    <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; max-width: 450px;">
        
        <div style="display: flex; flex-direction: row; gap: 15px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; border: 1px dashed #573191; width: 100%; box-sizing: border-box; align-items: center;">
            <img id="setupWizImage" src="" style="width: 110px; height: 110px; image-rendering: pixelated; border: 3px solid #573191; border-radius: 5px; background: #000;">
            
            <div id="traitsDisplay" style="flex: 1; font-size: 0.75em; line-height: 1.3;">
                <h3 style="color: #a382ff; border-bottom: 1px solid #573191; margin: 0 0 8px 0; font-size: 1em; letter-spacing: 1px;">TRAITS</h3>
                <p style="margin: 2px 0;"><strong>HEAD:</strong> <span id="trait-head" style="color: #ccc;">-</span></p>
                <p style="margin: 2px 0;"><strong>BODY:</strong> <span id="trait-body" style="color: #ccc;">-</span></p>
                <p style="margin: 2px 0;"><strong>PROP:</strong> <span id="trait-prop" style="color: #ccc;">-</span></p>
                <p style="margin: 2px 0;"><strong>FAM :</strong> <span id="trait-familiar" style="color: #ccc;">-</span></p>
                <p style="margin: 2px 0;"><strong>RUNE:</strong> <span id="trait-rune" style="color: #a382ff; font-weight: bold;">-</span></p>
            </div>
        </div>
        
        <div id="statsContainer" style="background: rgba(20, 20, 20, 0.9); padding: 15px; border: 2px solid #573191; border-radius: 12px; width: 100%; box-sizing: border-box; box-shadow: 0 0 15px rgba(87, 49, 145, 0.5);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 5px;">
                <span style="font-size: 0.9em; color: #ffd700; font-weight: bold;">CHARACTER STATS</span>
                <span id="availableEssence" style="font-size: 0.7em; color: #666; font-style: italic;">(LOCKED)</span>
            </div>
            
            <table style="border-collapse: collapse; width: 100%; font-size: 0.85em;">
                <thead>
                    <tr style="color: #a382ff; font-size: 0.9em;">
                        <th style="text-align: left; padding: 8px 5px;">STAT</th>
                        <th style="text-align: center; padding: 8px 5px;">BASE</th>
                        <th style="text-align: right; padding: 8px 5px;">BONUS</th>
                    </tr>
                </thead>
                <tbody id="statsBody">
                    </tbody>
            </table>
            
            <button id="confirmStats" style="margin-top: 20px; width: 100%; padding: 15px; cursor: pointer; background: #573191; color: white; border: none; font-weight: bold; font-family: 'Courier New', monospace; border-radius: 6px; font-size: 1.1em; box-shadow: 0 4px #3a1d63;">
                START ADVENTURE
            </button>
        </div>

    </div>
</div>
        
        <div id="powerUpScreen" style="display: none;">
            <h1>LEVEL UP!</h1>
            <p>Points available: <span id="skill-points">1</span></p>
            
            <div class="skill-tree-container">
                <div class="skill-path" data-path="offense">
                    <h3>OFFENSE</h3>
                    <button class="skill-node locked" data-level="1">Offense I</button>
                    <button class="skill-node locked" data-level="2">Offense II</button>
                    <button class="skill-node locked" data-level="3">Offense III</button>
                    <button class="skill-node locked" data-level="4">Offense IV</button>
                    <button class="skill-node locked" data-level="5">ULTIMATE ATK</button>
                </div>

                <div class="skill-path" data-path="defense">
                    <h3>DEFENSE</h3>
                    <button class="skill-node locked" data-level="1">Defense I</button>
                    <button class="skill-node locked" data-level="2">Defense II</button>
                    <button class="skill-node locked" data-level="3">Defense III</button>
                    <button class="skill-node locked" data-level="4">Defense IV</button>
                    <button class="skill-node locked" data-level="5">IMMORTAL</button>
                </div>

                <div class="skill-path" data-path="speed">
                    <h3>SPEED</h3>
                    <button class="skill-node locked" data-level="1">Speed I</button>
                    <button class="skill-node locked" data-level="2">Speed II</button>
                    <button class="skill-node locked" data-level="3">Speed III</button>
                    <button class="skill-node locked" data-level="4">Speed IV</button>
                    <button class="skill-node locked" data-level="5">TELEPORT</button>
                </div>

                <div class="skill-path" data-path="magic">
                    <h3>MAGIC</h3>
                    <button class="skill-node locked" data-level="1">Magic I</button>
                    <button class="skill-node locked" data-level="2">Magic II</button>
                    <button class="skill-node locked" data-level="3">Magic III</button>
                    <button class="skill-node locked" data-level="4">Magic IV</button>
                    <button class="skill-node locked" data-level="5">ARCHMAGE</button>
                </div>
            </div>
            
            <button id="closeSkills" style="margin-top: 20px;">BACK TO GAME</button>
        </div>
        
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
