<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep in Shadows</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        
        <canvas id="gameCanvas" width="393" height="852"></canvas>
        
        <div id="startScreen" class="obscure-theme">
    <div class="vignette"></div>
    <div class="scanlines"></div>

    <div class="content">
        <header>
            <h1 class="glitch-text" data-text="REBEL SHADOWS">REBEL SHADOWS</h1>
            <div class="manifesto">
                <p>The ritual fractured.</p>
                <p>The Dream World bleeds.</p>
                <p>Only the Book can bind what was unleashed.</p>
            </div>
        </header>

        <div class="action-zone">
            <button id="startButton">
                <span class="static-effect">ENTER THE VOID</span>
            </button>
        </div>
    </div>
</div>

        <div id="powerUpScreen">
            <h1>BOSS DEFEATED!</h1>
            <h2>CHOOSE POWER-UP</h2>
            <div class="power-up-options">
                <button id="pu-fireRate" class="power-up-btn">IMPROVE FIRE RATE</button>
                <button id="pu-special" class="power-up-btn">IMPROVE SPECIAL ATTACK</button>
            </div>
        </div>
        
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
