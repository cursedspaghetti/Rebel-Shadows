<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deep in Shadows</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="game-container">
        
        <canvas id="gameCanvas"></canvas>
         
        <div id="startScreen">
            <div id="title">
                <h1>REBEL SHADOWS</h1>
            </div>

            <div id="wizardSelector" style="margin-bottom: 20px;">
                <input type="number" id="wizardIdInput" placeholder="Enter Wizard ID" 
                       style="padding: 10px; border-radius: 5px; border: none; width: 150px;">
            </div>
            
            <button id="startButton">START GAME</button>
        </div>

<div id="characterSetup" style="display: flex; position: relative; width: 100%; min-height: 100vh; background: #050505; color: #dcdcdc; flex-direction: column; align-items: center; font-family: 'Courier New', monospace; overflow-y: auto; padding: 15px; box-sizing: border-box; z-index: 100; image-rendering: pixelated;">
    
    <pre id="wizardPixelName" style="margin: 10px 0; color: #ff3e3e; font-size: 0.6em; line-height: 1; text-align: center; font-weight: bold; filter: drop-shadow(2px 2px #000);">
 _ _ _  _  ____  ____  ____  ____ 
( | | )( )( ___)(  _ \(  _ \(  _ \
 )   (  )(  )__)  )   / )   / )(_) )
(_/ \_)(__)(____)(_)\_)(_)\_)(____/ 
    </pre>
    
    <div style="display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; max-width: 450px;">
        
        <div style="display: flex; flex-direction: row; gap: 15px; background: #121212; padding: 12px; border: 4px solid #ffffff; box-shadow: 6px 6px 0px #333; width: 100%; box-sizing: border-box; align-items: center;">
            <img id="setupWizImage" src="" style="width: 100px; height: 100px; image-rendering: pixelated; border: 4px solid #ff3e3e; background: #000; display: block;">
            
            <div id="traitsDisplay" style="flex: 1; font-size: 0.75em; line-height: 1.4;">
                <p style="margin: 2px 0;"><strong>HEAD:</strong> <span id="trait-head" style="color: #ff3e3e;">-</span></p>
                <p style="margin: 2px 0;"><strong>BODY:</strong> <span id="trait-body" style="color: #ff3e3e;">-</span></p>
                <p style="margin: 2px 0;"><strong>PROP:</strong> <span id="trait-prop" style="color: #ff3e3e;">-</span></p>
                <p style="margin: 2px 0;"><strong>FAM :</strong> <span id="trait-familiar" style="color: #ff3e3e;">-</span></p>
                <p style="margin: 2px 0;"><strong>RUNE:</strong> <span id="trait-rune" style="color: #ffffff;">-</span></p>
            </div>
        </div>
        
        <div id="statsContainer" style="background: #121212; padding: 15px; border: 4px solid #ffffff; width: 100%; box-sizing: border-box; box-shadow: 6px 6px 0px #333;">
            
            <table style="border-collapse: collapse; width: 100%; font-size: 0.85em; color: #dcdcdc;">
                <thead>
                    <tr style="color: #ff3e3e; font-size: 0.9em; border-bottom: 2px solid #ff3e3e;">
                        <th style="text-align: left; padding: 5px;">STAT</th>
                        <th style="text-align: center; padding: 5px;">VALUE</th>
                        <th style="text-align: center; padding: 5px;">BUFF</th>
                    </tr>
                </thead>
                <tbody id="statsBody">
                    </tbody>
            </table>
            
            <button id="confirmStats" style="margin-top: 20px; width: 100%; padding: 12px; cursor: pointer; background: #ff3e3e; color: #000; border: 4px solid #ffffff; font-weight: bold; font-family: 'Courier New', monospace; font-size: 1.2em; box-shadow: 4px 4px 0px #000; outline: none; text-transform: uppercase;" 
                onmousedown="this.style.transform='translate(2px, 2px)'; this.style.boxShadow='2px 2px 0px #000'" 
                onmouseup="this.style.transform='translate(0px, 0px)'; this.style.boxShadow='4px 4px 0px #000'">
                START_SESSION
            </button>
        </div>
    </div>
</div>
        
        <div id="powerUpScreen" style="display: none;">
            <h1>LEVEL UP!</h1>
            <p>Points available: <span id="skill-points">1</span></p>
            
            <div class="skill-tree-container">
                <div class="skill-path" data-path="offense">
                    <h3>OFFENSE</h3>
                    <button class="skill-node locked" data-level="1">Offense I</button>
                    <button class="skill-node locked" data-level="2">Offense II</button>
                    <button class="skill-node locked" data-level="3">Offense III</button>
                    <button class="skill-node locked" data-level="4">Offense IV</button>
                    <button class="skill-node locked" data-level="5">ULTIMATE ATK</button>
                </div>

                <div class="skill-path" data-path="defense">
                    <h3>DEFENSE</h3>
                    <button class="skill-node locked" data-level="1">Defense I</button>
                    <button class="skill-node locked" data-level="2">Defense II</button>
                    <button class="skill-node locked" data-level="3">Defense III</button>
                    <button class="skill-node locked" data-level="4">Defense IV</button>
                    <button class="skill-node locked" data-level="5">IMMORTAL</button>
                </div>

                <div class="skill-path" data-path="speed">
                    <h3>SPEED</h3>
                    <button class="skill-node locked" data-level="1">Speed I</button>
                    <button class="skill-node locked" data-level="2">Speed II</button>
                    <button class="skill-node locked" data-level="3">Speed III</button>
                    <button class="skill-node locked" data-level="4">Speed IV</button>
                    <button class="skill-node locked" data-level="5">TELEPORT</button>
                </div>

                <div class="skill-path" data-path="magic">
                    <h3>MAGIC</h3>
                    <button class="skill-node locked" data-level="1">Magic I</button>
                    <button class="skill-node locked" data-level="2">Magic II</button>
                    <button class="skill-node locked" data-level="3">Magic III</button>
                    <button class="skill-node locked" data-level="4">Magic IV</button>
                    <button class="skill-node locked" data-level="5">ARCHMAGE</button>
                </div>
            </div>
            
            <button id="closeSkills" style="margin-top: 20px;">BACK TO GAME</button>
        </div>
        
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
